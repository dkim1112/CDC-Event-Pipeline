services:
  # Source database (what Debezium watches)
  source-db:
    image: quay.io/debezium/postgres:16
    container_name: cdc-source-db
    environment:
      POSTGRES_DB: source_db
      POSTGRES_USER: cdc_user
      POSTGRES_PASSWORD: cdc_pass
    ports:
      - "5433:5432"
    volumes:
      - source_pgdata:/var/lib/postgresql/data
      - ./db/source_init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdc_user -d source_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Analytics database (where consumer writes)
  analytics-db:
    image: postgres:16-alpine
    container_name: cdc-analytics-db
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_pass
    ports:
      - "5434:5432"
    volumes:
      - analytics_pgdata:/var/lib/postgresql/data
      - ./db/analytics_init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_user -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Zookeeper (Kafka coordination)
  zookeeper:
    image: quay.io/debezium/zookeeper:2.7
    container_name: cdc-zookeeper
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 15s

  # Kafka broker
  kafka:
    image: quay.io/debezium/kafka:2.7
    container_name: cdc-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    healthcheck:
      test: ["CMD-SHELL", "/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 25s

  # Debezium Connect (runs the PostgreSQL connector)
  debezium:
    image: quay.io/debezium/connect:2.7
    container_name: cdc-debezium
    depends_on:
      kafka:
        condition: service_healthy
      source-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_config
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

volumes:
  source_pgdata:
  analytics_pgdata:
